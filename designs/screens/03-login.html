<!DOCTYPE html>
<html>
<head>
  <script src="https://mcp.figma.com/mcp/html-to-design/capture.js" async></script>
  <meta charset="UTF-8">
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body {
      width: 375px;
      height: 812px;
      overflow: hidden;
      font-family: 'Nunito', sans-serif;
      background: #F6F3EE;
      color: #18182B;
    }
    body { display: flex; flex-direction: column; }

    /* Status bar */
    .status-bar {
      height: 44px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 24px;
      flex-shrink: 0;
    }
    .status-time {
      font-size: 15px;
      font-weight: 600;
      color: #18182B;
    }
    .status-icons {
      display: flex;
      gap: 6px;
      align-items: center;
    }

    /* Header */
    .header {
      padding: 6px 24px 22px;
    }
    .back-btn {
      width: 38px;
      height: 38px;
      background: white;
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 22px;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.06);
    }
    .logo-small {
      width: 40px;
      height: 40px;
      background: linear-gradient(135deg, #3D57E8, #2A3FC4);
      border-radius: 13px;
      display: flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 16px;
    }
    .screen-title {
      font-size: 28px;
      font-weight: 800;
      letter-spacing: -0.4px;
      margin-bottom: 5px;
      color: #18182B;
    }
    .screen-sub {
      font-size: 13px;
      font-weight: 400;
      color: #9CA3AF;
      line-height: 1.5;
    }

    /* Form area */
    .form-area {
      flex: 1;
      padding: 0 24px;
      display: flex;
      flex-direction: column;
      gap: 14px;
    }
    .input-group {
      display: flex;
      flex-direction: column;
      gap: 5px;
    }
    .input-label {
      font-size: 11px;
      font-weight: 700;
      color: #9CA3AF;
      text-transform: uppercase;
      letter-spacing: 0.7px;
    }
    .input-field {
      background: white;
      border: 1.5px solid #E4DED5;
      border-radius: 14px;
      height: 50px;
      padding: 0 16px;
      font-size: 15px;
      font-weight: 500;
      color: #18182B;
      font-family: 'Nunito', sans-serif;
      width: 100%;
      outline: none;
    }
    .input-field:focus {
      border-color: #3D57E8;
    }
    .forgot-link {
      text-align: right;
      font-size: 13px;
      font-weight: 600;
      color: #3D57E8;
    }

    /* Divider */
    .divider {
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .divider-line {
      flex: 1;
      height: 1px;
      background: #E4DED5;
    }
    .divider-text {
      font-size: 12px;
      font-weight: 500;
      color: #9CA3AF;
    }

    /* Social button */
    .social-btn {
      background: white;
      border: 1.5px solid #E4DED5;
      border-radius: 14px;
      height: 50px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      font-size: 14px;
      font-weight: 600;
      color: #18182B;
      font-family: 'Nunito', sans-serif;
      cursor: pointer;
      box-shadow: 0 2px 16px rgba(0, 0, 0, 0.07);
    }

    /* Bottom */
    .bottom-area {
      padding: 14px 24px 44px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }
    .btn-primary {
      background: #3D57E8;
      color: white;
      border: none;
      border-radius: 16px;
      height: 56px;
      font-size: 16px;
      font-weight: 700;
      cursor: pointer;
      width: 100%;
      font-family: 'Nunito', sans-serif;
    }
    .signup-link {
      text-align: center;
      font-size: 14px;
      font-weight: 500;
      color: #545E70;
    }
    .signup-link a {
      color: #E06A4A;
      font-weight: 700;
      text-decoration: none;
    }
  </style>
</head>
<body>

  <!-- Status Bar -->
  <div class="status-bar">
    <span class="status-time">9:41</span>
    <div class="status-icons">
      <svg width="17" height="12" viewBox="0 0 17 12" fill="#18182B">
        <rect x="0" y="4" width="3" height="8" rx="1"/>
        <rect x="4.5" y="2.5" width="3" height="9.5" rx="1"/>
        <rect x="9" y="0.5" width="3" height="11.5" rx="1"/>
        <rect x="13.5" y="0" width="3.5" height="12" rx="1" opacity="0.3"/>
      </svg>
      <svg width="16" height="12" viewBox="0 0 16 12" fill="none">
        <rect x="0.5" y="0.5" width="13" height="11" rx="2" stroke="#18182B" stroke-width="1.2"/>
        <rect x="2" y="2" width="9" height="8" rx="1" fill="#18182B"/>
        <rect x="14" y="4" width="2" height="4" rx="1" fill="#18182B" opacity="0.4"/>
      </svg>
    </div>
  </div>

  <!-- Header -->
  <div class="header">
    <div class="back-btn">
      <svg width="18" height="14" viewBox="0 0 18 14" fill="none">
        <path d="M7 1L1 7M1 7L7 13M1 7H17" stroke="#18182B" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
    </div>

    <div class="logo-small">
      <svg width="24" height="24" viewBox="0 0 50 50" fill="none">
        <path d="M25 6L43 19V44H7V19L25 6Z" fill="rgba(255,255,255,0.92)"/>
        <path d="M19 44V32C19 28.134 21.686 25 25 25C28.314 25 31 28.134 31 32V44" fill="rgba(42,63,196,0.5)"/>
        <circle cx="25" cy="15.5" r="3.5" fill="rgba(255,255,255,0.55)"/>
      </svg>
    </div>

    <div class="screen-title">Welcome back</div>
    <div class="screen-sub">Log in to continue supporting your child</div>
  </div>

  <!-- Form -->
  <div class="form-area">

    <div class="input-group">
      <div class="input-label">Email Address</div>
      <input class="input-field" type="email" value="maria@email.com" placeholder="email@example.com">
    </div>

    <div class="input-group">
      <div class="input-label">Password</div>
      <input class="input-field" type="password" value="password1" placeholder="Your password">
    </div>

    <div class="forgot-link">Forgot password?</div>

    <div class="divider">
      <div class="divider-line"></div>
      <div class="divider-text">or continue with</div>
      <div class="divider-line"></div>
    </div>

    <div class="social-btn">
      <svg width="20" height="20" viewBox="0 0 20 20" fill="none">
        <path d="M19.6 10.23c0-.68-.06-1.36-.18-2H10v3.8h5.38c-.23 1.23-.94 2.27-2 2.97v2.47h3.23c1.9-1.74 2.99-4.31 2.99-7.24z" fill="#4285F4"/>
        <path d="M10 20c2.7 0 4.96-.9 6.62-2.43l-3.23-2.47c-.9.6-2.04.96-3.39.96-2.6 0-4.81-1.75-5.6-4.1H1.07v2.55C2.72 17.74 6.1 20 10 20z" fill="#34A853"/>
        <path d="M4.4 11.96A6.02 6.02 0 0 1 4.07 10c0-.68.12-1.34.33-1.96V5.49H1.07A10 10 0 0 0 0 10c0 1.61.39 3.14 1.07 4.51l3.33-2.55z" fill="#FBBC05"/>
        <path d="M10 3.96c1.47 0 2.79.5 3.82 1.5L16.7 2.54C14.96.98 12.7 0 10 0 6.1 0 2.72 2.26 1.07 5.49L4.4 8.04c.79-2.35 3-4.08 5.6-4.08z" fill="#EA4335"/>
      </svg>
      Continue with Google
    </div>

  </div>

  <!-- Bottom -->
  <div class="bottom-area">
    <button class="btn-primary">Log in</button>
    <div class="signup-link">New here? <a href="#">Create an account</a></div>
  </div>

</body>
</html>
