<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=375, initial-scale=1.0" />
  <title>Relate — Session Complete</title>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;500;600;700;800;900&display=swap" rel="stylesheet" />
  <script src="https://mcp.figma.com/mcp/html-to-design/capture.js" async></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Nunito', sans-serif;
      background: #F6F3EE;
      width: 375px;
      height: 812px;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      color: #18182B;
    }

    /* STATUS BAR */
    .status-bar {
      display: flex; justify-content: space-between; align-items: center;
      padding: 14px 20px 10px; background: #F6F3EE;
    }
    .status-time { font-size: 15px; font-weight: 700; color: #18182B; }
    .status-icons { display: flex; align-items: center; gap: 6px; }

    /* SCROLL */
    .scroll-body {
      flex: 1; overflow-y: auto;
      padding: 10px 20px 0;
      display: flex; flex-direction: column; gap: 14px;
      align-items: stretch;
    }
    .scroll-body::-webkit-scrollbar { display: none; }

    /* CELEBRATION TOP */
    .celebration-top {
      display: flex; flex-direction: column; align-items: center; gap: 10px;
      padding-top: 4px;
    }
    .check-circle {
      width: 80px; height: 80px; border-radius: 50%;
      background: #3D57E8;
      box-shadow: 0 8px 28px rgba(61,87,232,0.35);
      display: flex; align-items: center; justify-content: center;
    }
    .session-heading {
      font-size: 24px; font-weight: 800; color: #18182B;
      text-align: center; line-height: 1.2;
    }
    .session-sub {
      font-size: 15px; font-weight: 600; color: #545E70;
      text-align: center;
    }

    /* STATS ROW */
    .stats-row {
      display: flex; gap: 8px;
    }
    .stat-card {
      flex: 1; background: #FFFFFF;
      border-radius: 16px; padding: 14px 10px;
      box-shadow: 0 2px 16px rgba(0,0,0,0.07);
      display: flex; flex-direction: column; align-items: center; gap: 4px;
      text-align: center;
    }
    .stat-value { font-size: 20px; font-weight: 800; color: #18182B; }
    .stat-label { font-size: 11px; font-weight: 700; color: #9CA3AF; letter-spacing: 0.2px; }

    /* SKILL SUMMARY CARD */
    .summary-card {
      background: #FFFFFF; border-radius: 20px; padding: 20px;
      box-shadow: 0 2px 16px rgba(0,0,0,0.07);
      display: flex; flex-direction: column; gap: 14px;
    }
    .summary-title { font-size: 18px; font-weight: 700; color: #18182B; }
    .steps-dots { display: flex; gap: 8px; align-items: center; }
    .step-dot {
      width: 32px; height: 8px; border-radius: 6px;
      background: #3D57E8;
    }
    .step-dot-label {
      font-size: 11px; font-weight: 700; color: #3D57E8; margin-left: 4px;
    }
    .skill-badge {
      display: inline-flex; align-items: center; gap: 6px;
      background: #EEF1FF; color: #3D57E8;
      font-size: 12px; font-weight: 700;
      padding: 5px 12px; border-radius: 20px;
      align-self: flex-start;
    }
    .skill-badge svg { flex-shrink: 0; }

    /* REFLECTION */
    .reflection-label {
      font-size: 13px; font-weight: 700; color: #18182B; margin-bottom: 2px;
    }
    .emoji-row { display: flex; gap: 8px; }
    .emoji-btn {
      flex: 1; padding: 10px 6px;
      border: 1.5px solid #E4DED5; border-radius: 14px;
      background: #FFFFFF;
      display: flex; flex-direction: column; align-items: center; gap: 4px;
      cursor: pointer;
    }
    .emoji-btn.selected {
      border-color: #3D57E8; background: #EEF1FF;
    }
    .emoji-symbol { font-size: 22px; line-height: 1; }
    .emoji-label { font-size: 11px; font-weight: 700; color: #545E70; }
    .emoji-btn.selected .emoji-label { color: #3D57E8; }

    /* RECOMMENDATION CARD */
    .rec-card {
      background: #FFF8E3;
      border-left: 3px solid #F2BE42;
      border-radius: 16px; padding: 16px;
      display: flex; flex-direction: column; gap: 6px;
    }
    .rec-badge { font-size: 12px; font-weight: 700; color: #C49B1E; letter-spacing: 0.2px; }
    .rec-title { font-size: 16px; font-weight: 700; color: #18182B; }
    .rec-meta { font-size: 12px; font-weight: 600; color: #9CA3AF; }
    .rec-link { font-size: 13px; font-weight: 700; color: #3D57E8; cursor: pointer; }

    /* BOTTOM */
    .bottom-area {
      padding: 12px 20px 28px;
      display: flex; flex-direction: column; gap: 10px;
      background: #F6F3EE;
    }
    .btn-share {
      width: 100%; height: 50px;
      border: 1.5px solid #C8D5FF;
      background: #FFFFFF; color: #3D57E8;
      border-radius: 18px;
      font-family: 'Nunito', sans-serif;
      font-size: 15px; font-weight: 700;
      cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 8px;
    }
    .btn-home {
      width: 100%; height: 56px;
      background: #3D57E8; color: #FFFFFF;
      border: none; border-radius: 18px;
      font-family: 'Nunito', sans-serif;
      font-size: 16px; font-weight: 800;
      cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 8px;
      box-shadow: 0 4px 16px rgba(61,87,232,0.28);
    }
  </style>
</head>
<body>

  <!-- STATUS BAR -->
  <div class="status-bar">
    <span class="status-time">9:41</span>
    <div class="status-icons">
      <svg width="17" height="12" viewBox="0 0 17 12" fill="#18182B"><rect x="0" y="4" width="3" height="8" rx="1"/><rect x="4.5" y="2.5" width="3" height="9.5" rx="1"/><rect x="9" y="0.5" width="3" height="11.5" rx="1"/><rect x="13.5" y="0" width="3.5" height="12" rx="1" opacity="0.3"/></svg>
      <svg width="16" height="12" viewBox="0 0 16 12" fill="none"><rect x="0.5" y="0.5" width="13" height="11" rx="2" stroke="#18182B" stroke-width="1.2"/><rect x="2" y="2" width="9" height="8" rx="1" fill="#18182B"/><rect x="14" y="4" width="2" height="4" rx="1" fill="#18182B" opacity="0.4"/></svg>
    </div>
  </div>

  <!-- SCROLL BODY -->
  <div class="scroll-body">

    <!-- CELEBRATION TOP -->
    <div class="celebration-top">
      <div class="check-circle">
        <svg width="36" height="36" viewBox="0 0 36 36" fill="none">
          <path d="M8 18L15 25L28 11" stroke="white" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </div>
      <p class="session-heading">Session complete!</p>
      <p class="session-sub">Great work with Lucas today</p>
    </div>

    <!-- STATS ROW -->
    <div class="stats-row">
      <div class="stat-card">
        <span class="stat-value">4:32</span>
        <span class="stat-label">Duration</span>
      </div>
      <div class="stat-card">
        <span class="stat-value">4/4</span>
        <span class="stat-label">Steps Done</span>
      </div>
      <div class="stat-card">
        <span class="stat-value" style="color:#E06A4A;">5</span>
        <span class="stat-label">Day Streak</span>
      </div>
    </div>

    <!-- SKILL SUMMARY CARD -->
    <div class="summary-card">
      <span class="summary-title">Making Eye Contact</span>

      <!-- STEP DOTS -->
      <div style="display:flex; flex-direction:column; gap:8px;">
        <div class="steps-dots">
          <div class="step-dot"></div>
          <div class="step-dot"></div>
          <div class="step-dot"></div>
          <div class="step-dot"></div>
          <span class="step-dot-label">All 4 steps complete</span>
        </div>
      </div>

      <div class="skill-badge">
        <svg width="12" height="12" viewBox="0 0 12 12" fill="none"><path d="M2 6L5 9L10 3" stroke="#3D57E8" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></svg>
        Communication · Completed
      </div>

      <!-- REFLECTION -->
      <div style="display:flex; flex-direction:column; gap:8px;">
        <span class="reflection-label">How did it go?</span>
        <div class="emoji-row">
          <div class="emoji-btn selected">
            <span class="emoji-symbol">😊</span>
            <span class="emoji-label">Great</span>
          </div>
          <div class="emoji-btn">
            <span class="emoji-symbol">😐</span>
            <span class="emoji-label">OK</span>
          </div>
          <div class="emoji-btn">
            <span class="emoji-symbol">😔</span>
            <span class="emoji-label">Hard</span>
          </div>
        </div>
      </div>
    </div>

    <!-- RECOMMENDATION CARD -->
    <div class="rec-card">
      <span class="rec-badge">Next suggested skill</span>
      <span class="rec-title">Requesting Objects</span>
      <span class="rec-meta">Communication · 5 min/day</span>
      <span class="rec-link">Start tomorrow</span>
    </div>

  </div>

  <!-- BOTTOM AREA -->
  <div class="bottom-area">
    <button class="btn-share">
      <svg width="16" height="16" viewBox="0 0 16 16" fill="none"><circle cx="13" cy="3" r="2" stroke="#3D57E8" stroke-width="1.5"/><circle cx="13" cy="13" r="2" stroke="#3D57E8" stroke-width="1.5"/><circle cx="3" cy="8" r="2" stroke="#3D57E8" stroke-width="1.5"/><path d="M5 7L11 4M5 9L11 12" stroke="#3D57E8" stroke-width="1.5" stroke-linecap="round"/></svg>
      Share progress
    </button>
    <button class="btn-home">
      Back to Home
      <svg width="16" height="16" viewBox="0 0 16 16" fill="none"><path d="M3 8H13M9 4L13 8L9 12" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
    </button>
  </div>

</body>
</html>
