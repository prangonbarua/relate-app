<!DOCTYPE html>
<html><head><script src="https://mcp.figma.com/mcp/html-to-design/capture.js" async></script><meta charset="UTF-8">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
html, body { width: 375px; height: 812px; overflow: hidden; font-family: 'Inter', -apple-system, sans-serif; }
body { background: linear-gradient(155deg, #446dff 0%, #2D52CC 55%, #1A3A9E 100%); color: white; display: flex; flex-direction: column; }
.status-bar { height: 44px; display: flex; align-items: center; justify-content: space-between; padding: 0 24px; flex-shrink: 0; }
.status-time { font-size: 15px; font-weight: 600; }
.status-icons { display: flex; gap: 6px; align-items: center; opacity: 0.9; }
.content { flex: 1; display: flex; flex-direction: column; align-items: center; padding: 24px 28px 0; }
.logo-icon { width: 90px; height: 90px; background: rgba(255,255,255,0.18); border-radius: 28px; display: flex; align-items: center; justify-content: center; margin-bottom: 18px; border: 1.5px solid rgba(255,255,255,0.3); }
.app-name { font-size: 44px; font-weight: 800; letter-spacing: -1.5px; }
.tagline { font-size: 15px; font-weight: 400; color: rgba(255,255,255,0.75); text-align: center; line-height: 1.6; margin-top: 8px; }
.illustration { width: 260px; height: 160px; margin: 28px 0 20px; background: rgba(255,255,255,0.1); border-radius: 24px; display: flex; align-items: center; justify-content: center; border: 1px solid rgba(255,255,255,0.15); }
.lang-chips { display: flex; gap: 8px; flex-wrap: wrap; justify-content: center; }
.lang-chip { background: rgba(255,255,255,0.18); border: 1px solid rgba(255,255,255,0.35); border-radius: 20px; padding: 6px 14px; font-size: 12px; font-weight: 600; color: white; }
.bottom-area { padding: 24px 28px 44px; display: flex; flex-direction: column; gap: 14px; }
.btn-primary { background: #ce1a1a; color: white; border: none; border-radius: 18px; height: 58px; font-size: 17px; font-weight: 600; cursor: pointer; width: 100%; font-family: 'Inter', sans-serif; box-shadow: 0 10px 28px rgba(206,26,26,0.5); letter-spacing: -0.2px; }
.login-link { text-align: center; font-size: 15px; color: rgba(255,255,255,0.7); }
.login-link span { color: white; font-weight: 600; }
</style></head>
<body>
<div class="status-bar">
  <span class="status-time">9:41</span>
  <div class="status-icons">
    <svg width="17" height="12" viewBox="0 0 17 12" fill="white"><rect x="0" y="4" width="3" height="8" rx="1"/><rect x="4.5" y="2.5" width="3" height="9.5" rx="1"/><rect x="9" y="0.5" width="3" height="11.5" rx="1"/><rect x="13.5" y="0" width="3.5" height="12" rx="1" opacity="0.35"/></svg>
    <svg width="16" height="12" viewBox="0 0 16 12" fill="none"><rect x="0.5" y="0.5" width="13" height="11" rx="2" stroke="white" stroke-width="1.2"/><rect x="2" y="2" width="9" height="8" rx="1" fill="white"/><rect x="14" y="4" width="2" height="4" rx="1" fill="white" opacity="0.5"/></svg>
  </div>
</div>
<div class="content">
  <div class="logo-icon">
    <svg width="50" height="50" viewBox="0 0 50 50" fill="none">
      <path d="M25 6L43 19V44H7V19L25 6Z" fill="rgba(255,255,255,0.9)"/>
      <path d="M19 44V32C19 28.134 21.686 25 25 25C28.314 25 31 28.134 31 32V44" fill="#2D52CC"/>
      <circle cx="25" cy="16" r="3.5" fill="#ce1a1a"/>
    </svg>
  </div>
  <div class="app-name">Nido</div>
  <div class="tagline">Support for every family's journey<br>Apoyo para cada familia · دعم لكل عائلة</div>
  <div class="illustration">
    <svg width="200" height="130" viewBox="0 0 200 130" fill="none">
      <circle cx="65" cy="45" r="26" fill="rgba(255,255,255,0.2)"/>
      <circle cx="135" cy="45" r="20" fill="rgba(255,255,255,0.15)"/>
      <circle cx="100" cy="68" r="18" fill="rgba(255,255,255,0.25)"/>
      <circle cx="65" cy="45" r="14" fill="rgba(255,255,255,0.15)"/>
      <circle cx="135" cy="45" r="10" fill="rgba(255,255,255,0.12)"/>
      <circle cx="100" cy="68" r="9" fill="rgba(206,26,26,0.5)"/>
      <path d="M45 108 Q65 88 100 93 Q135 88 155 108" stroke="rgba(255,255,255,0.4)" stroke-width="2.5" fill="none" stroke-linecap="round"/>
      <circle cx="78" cy="20" r="5" fill="rgba(206,26,26,0.4)"/>
      <circle cx="122" cy="18" r="4" fill="rgba(255,255,255,0.3)"/>
    </svg>
  </div>
  <div class="lang-chips">
    <div class="lang-chip">English</div>
    <div class="lang-chip">Español</div>
    <div class="lang-chip">العربية</div>
    <div class="lang-chip">中文</div>
  </div>
</div>
<div class="bottom-area">
  <button class="btn-primary">Get Started →</button>
  <div class="login-link">Already have an account? <span>Log In</span></div>
</div>
</body></html>
