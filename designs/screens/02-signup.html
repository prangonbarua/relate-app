<!DOCTYPE html>
<html><head><script src="https://mcp.figma.com/mcp/html-to-design/capture.js" async></script><meta charset="UTF-8">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
html, body { width: 375px; height: 812px; overflow: hidden; font-family: 'Inter', -apple-system, sans-serif; background: #F9F6F1; color: #1C1C2E; }
body { display: flex; flex-direction: column; }
.status-bar { height: 44px; display: flex; align-items: center; justify-content: space-between; padding: 0 24px; flex-shrink: 0; }
.status-time { font-size: 15px; font-weight: 600; color: #1C1C2E; }
.status-icons { display: flex; gap: 6px; align-items: center; }
.header { padding: 4px 24px 20px; display: flex; flex-direction: column; }
.back-btn { width: 38px; height: 38px; background: white; border-radius: 12px; display: flex; align-items: center; justify-content: center; margin-bottom: 20px; box-shadow: 0 2px 8px rgba(0,0,0,0.06); }
.screen-title { font-size: 28px; font-weight: 800; letter-spacing: -0.5px; margin-bottom: 4px; }
.screen-sub { font-size: 14px; color: #6B7280; }
.form-area { flex: 1; padding: 0 24px; overflow: hidden; display: flex; flex-direction: column; gap: 14px; }
.input-group { display: flex; flex-direction: column; gap: 6px; }
.input-label { font-size: 13px; font-weight: 500; color: #6B7280; }
.input-field { background: white; border: 1.5px solid #E8E3DC; border-radius: 14px; height: 52px; padding: 0 16px; font-size: 15px; color: #1C1C2E; font-family: 'Inter', sans-serif; width: 100%; outline: none; }
.input-field.active { border-color: #446dff; }
.select-field { background: white; border: 1.5px solid #E8E3DC; border-radius: 14px; height: 52px; padding: 0 16px; font-size: 15px; color: #1C1C2E; font-family: 'Inter', sans-serif; width: 100%; appearance: none; background-image: url("data:image/svg+xml,%3Csvg width='12' height='8' viewBox='0 0 12 8' fill='none' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M1 1L6 7L11 1' stroke='%236B7280' stroke-width='1.5' stroke-linecap='round'/%3E%3C/svg%3E"); background-repeat: no-repeat; background-position: right 16px center; }
.divider { display: flex; align-items: center; gap: 12px; }
.divider-line { flex: 1; height: 1px; background: #E8E3DC; }
.divider-text { font-size: 13px; color: #9CA3AF; }
.bottom-area { padding: 16px 24px 40px; display: flex; flex-direction: column; gap: 12px; }
.btn-primary { background: #ce1a1a; color: white; border: none; border-radius: 18px; height: 58px; font-size: 17px; font-weight: 600; cursor: pointer; width: 100%; font-family: 'Inter', sans-serif; box-shadow: 0 8px 24px rgba(206,26,26,0.35); letter-spacing: -0.2px; }
.login-link { text-align: center; font-size: 14px; color: #6B7280; }
.login-link span { color: #446dff; font-weight: 600; }
.terms { font-size: 11px; color: #9CA3AF; text-align: center; line-height: 1.5; }
.terms span { color: #446dff; }
</style></head>
<body>
<div class="status-bar">
  <span class="status-time">9:41</span>
  <div class="status-icons">
    <svg width="17" height="12" viewBox="0 0 17 12" fill="#1C1C2E"><rect x="0" y="4" width="3" height="8" rx="1"/><rect x="4.5" y="2.5" width="3" height="9.5" rx="1"/><rect x="9" y="0.5" width="3" height="11.5" rx="1"/><rect x="13.5" y="0" width="3.5" height="12" rx="1" opacity="0.3"/></svg>
    <svg width="16" height="12" viewBox="0 0 16 12" fill="none"><rect x="0.5" y="0.5" width="13" height="11" rx="2" stroke="#1C1C2E" stroke-width="1.2"/><rect x="2" y="2" width="9" height="8" rx="1" fill="#1C1C2E"/><rect x="14" y="4" width="2" height="4" rx="1" fill="#1C1C2E" opacity="0.4"/></svg>
  </div>
</div>
<div class="header">
  <div class="back-btn">
    <svg width="18" height="14" viewBox="0 0 18 14" fill="none"><path d="M7 1L1 7M1 7L7 13M1 7H17" stroke="#1C1C2E" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></svg>
  </div>
  <div class="screen-title">Create Account</div>
  <div class="screen-sub">Join thousands of families finding support</div>
</div>
<div class="form-area">
  <div class="input-group">
    <div class="input-label">Full Name</div>
    <input class="input-field" type="text" placeholder="Your name" value="Maria Santos">
  </div>
  <div class="input-group">
    <div class="input-label">Email Address</div>
    <input class="input-field active" type="email" placeholder="email@example.com" value="maria@email.com">
  </div>
  <div class="input-group">
    <div class="input-label">Password</div>
    <input class="input-field" type="password" placeholder="Create a password" value="••••••••">
  </div>
  <div class="input-group">
    <div class="input-label">Preferred Language</div>
    <select class="select-field">
      <option>Español (Spanish)</option>
      <option>English</option>
      <option>العربية (Arabic)</option>
      <option>中文 (Chinese)</option>
    </select>
  </div>
  <div class="terms">By creating an account, you agree to our <span>Terms of Service</span> and <span>Privacy Policy</span></div>
</div>
<div class="bottom-area">
  <button class="btn-primary">Create Account</button>
  <div class="login-link">Already have an account? <span>Log In</span></div>
</div>
</body></html>
